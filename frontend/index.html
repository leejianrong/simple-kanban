<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Kanban</title>
    <script>
      // Set the theme attribute before first paint to avoid a flash of the wrong
      // theme. Mirrors src/lib/theme.svelte.ts (localStorage → OS preference).
      (function () {
        try {
          var t = localStorage.getItem("kanban.theme");
          if (t !== "light" && t !== "dark") {
            t = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          }
          document.documentElement.setAttribute("data-theme", t);
        } catch (e) {
          /* ignore — CSS falls back to the prefers-color-scheme media query */
        }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
