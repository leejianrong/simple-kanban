# Zensical configuration for the Simple Kanban documentation site.
#
# Zensical (https://zensical.org) is the successor to Material for MkDocs from
# the same team. It renders the docs/ markdown tree to a static site/ directory.
#
#   uv run --project docs-tooling --frozen zensical build --strict --clean
#
# `--strict` turns build warnings (notably broken internal .md links) into a
# non-zero exit, which is what gates the docs build-check job in CI.
#
# The generated site/ directory is a build artifact — it is gitignored and CI
# rebuilds it fresh on every run.

[project]
site_name = "Simple Kanban Docs"
site_description = "Design docs, ADRs, and guides for the Simple Kanban project — a Shape Up, API-first kanban board with an agent-driven task-tracking layer."
site_author = "Jian"
site_url = "https://leejianrong.github.io/simple-kanban/"
copyright = "Copyright &copy; 2026 Simple Kanban"

docs_dir = "docs"
site_dir = "site"

repo_url = "https://github.com/leejianrong/simple-kanban"
repo_name = "leejianrong/simple-kanban"

# Explicit navigation. Files under docs/ that are not listed here (internal
# session prompts, spikes, UAT logs) are still built but stay out of the nav.
nav = [
  { "Home" = "index.md" },
  { "Shape Up chain" = [
    "REQS.md",
    "FRAME.md",
    "PRD.md",
    "CONTEXT.md",
    "SHAPING.md",
    "BREADBOARD.md",
  ] },
  { "Architecture decisions" = [
    "adr/0001-tech-stack-and-monorepo.md",
    "adr/0002-postgres-and-alembic-from-day-one.md",
    "adr/0003-single-artifact-deployment.md",
    "adr/0004-hosting-and-cicd.md",
    "adr/0005-api-first-mcp-ready.md",
    "adr/0006-data-model-and-domain-decisions.md",
    "adr/0007-no-auth-concurrency-and-realtime.md",
    "adr/0008-implementation-stack-details.md",
    "adr/0009-epic-as-first-class-entity.md",
    "adr/0010-optional-agent-token-auth.md",
    "adr/0011-github-cookie-session-auth.md",
    "adr/0012-multi-board-with-ownership.md",
    "adr/0013-board-authorization.md",
    "adr/0014-agent-personal-access-tokens.md",
    "adr/0015-mcp-board-scoping-and-retiring-api-tokens.md",
    "adr/0016-github-pr-board-autosync.md",
  ] },
  { "Milestone 2 — agent task tracking" = [
    "milestone-2/FRAME.md",
    "milestone-2/SHAPING.md",
    "milestone-2/BREADBOARD.md",
    "milestone-2/SLICES.md",
  ] },
  { "Milestone 3 — accounts & boards" = [
    "milestone-3/FRAME.md",
    "milestone-3/SHAPING.md",
    "milestone-3/BREADBOARD.md",
    "milestone-3/SLICES.md",
  ] },
  { "Guides" = [
    "guides/agent-onboarding.md",
    "guides/autosync-github-setup.md",
    "guides/e2e-testing-with-auth.md",
    "DEVELOPER-WORKFLOWS.md",
  ] },
]

[project.theme]
language = "en"
features = [
  "navigation.tabs",
  "navigation.sections",
  "navigation.top",
  "navigation.footer",
  "toc.follow",
  "content.code.copy",
  "search.suggest",
  "search.highlight",
  "announce.dismiss",
]

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

# Markdown extensions — the sensible-default set Zensical scaffolds, kept so
# admonitions, code highlighting, content tabs, and mermaid diagrams render.
[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.betterem]
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
combine_header_slug = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
[project.markdown_extensions.pymdownx.tilde]
