name: CI

# Validate every PR and every push to main (ADR 0004): backend tests + frontend
# build/type-check. The Deploy workflow only runs after this one succeeds on main.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # Tests use testcontainers to spin up real Postgres 17 (conftest.py);
      # the ubuntu-latest runner has a running Docker daemon available.
      - name: Run pytest
        working-directory: backend
        run: uv run --frozen --group dev pytest -q

  frontend:
    name: Frontend build & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        working-directory: frontend
        run: npm ci

      - name: Type-check (svelte-check)
        working-directory: frontend
        run: npm run check

      - name: Build
        working-directory: frontend
        run: npm run build
