name: CI

# Validate every PR and every push to main (ADR 0004). Nine independent jobs:
# lint, fast unit tests (no Docker), integration tests (real Postgres via
# testcontainers), the frontend build/type-check, Playwright e2e smoke tests
# (real Postgres via a service container), the shared kanban-client's lint +
# tests, the MCP server's lint + tests, the `kan` CLI's lint + tests (the
# middle three all mocked httpx, no DB), and a supply-chain `security` scan
# (secret scan over history + dependency vulnerability audit). The Deploy
# workflow only runs after this whole workflow succeeds on main.
#
# CI path filtering (KAN-37): a leading `changes` job computes which areas of
# the repo a PR touched; each of the eight jobs then guards its *heavy steps*
# on the relevant output. On a docs-only change (nothing under backend/,
# frontend/, mcp/, kanban-client/, kanban-cli/ — e.g. this workflow file itself,
# docs/, .claude/, root *.md) every job still RUNS and REPORTS SUCCESS under its
# existing `name:`, but skips the expensive install/test work in seconds.
#
# This is a deliberately GATE-SAFE design: branch protection lists several of
# these `name:`s as *required* status checks, and a required check that never
# reports (the classic trap of a job-level `if:` skip, or a top-level
# `paths:`/`paths-ignore:` filter on the trigger) leaves every PR stuck at
# "Expected" and un-mergeable. Because each job still completes, each required
# name still reports success — the gate is never left hanging. A more
# aggressive variant that also cuts the *runner count* (job-level `if:` skips
# behind a single `CI Success` aggregator made the sole required check) would
# require a branch-protection settings change by a maintainer and is left as a
# documented follow-up, not done here.
on:
  pull_request:
  push:
    branches: [main]

# Cancel a superseded in-progress run when a new commit is pushed to the same
# ref (dev-playbook principle 6). Without this, pushing twice to a PR runs both
# to completion and wastes runners on the stale commit. Keyed per workflow+ref
# so main and each PR branch have independent groups. (Deploy has its own
# concurrency group in deploy.yml — don't add one there.)
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Lightweight gate: classify which areas of the repo changed. Every other
  # job `needs:` this and reads its outputs to decide whether to do real work.
  # Kept minimal and dependency-light so it is extremely unlikely to fail (a
  # failure here would skip the dependents and could stall a required check).
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      mcp: ${{ steps.filter.outputs.mcp }}
      client: ${{ steps.filter.outputs.client }}
      cli: ${{ steps.filter.outputs.cli }}
      app: ${{ steps.filter.outputs.app }}
    steps:
      # Needed so paths-filter can diff on `push` events (on `pull_request` it
      # uses the GitHub API and doesn't strictly need the checkout).
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          # `app` is the union of all code areas — anything NOT matching it is
          # a docs-only change (docs/, .claude/, .github/, root *.md, ...).
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            mcp:
              - 'mcp/**'
            client:
              - 'kanban-client/**'
            cli:
              - 'kanban-cli/**'
            app:
              - 'backend/**'
              - 'frontend/**'
              - 'mcp/**'
              - 'kanban-client/**'
              - 'kanban-cli/**'

  lint:
    name: Lint (ruff)
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - name: Skip (no backend changes)
        if: needs.changes.outputs.backend != 'true'
        run: echo "No backend changes — skipping ruff lint."
      - uses: actions/checkout@v7
        if: needs.changes.outputs.backend == 'true'
      - name: Install uv
        if: needs.changes.outputs.backend == 'true'
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Ruff lint
        if: needs.changes.outputs.backend == 'true'
        working-directory: backend
        run: uv run --frozen --group dev ruff check .

  unit:
    name: Unit tests
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - name: Skip (no backend changes)
        if: needs.changes.outputs.backend != 'true'
        run: echo "No backend changes — skipping unit tests."
      - uses: actions/checkout@v7
        if: needs.changes.outputs.backend == 'true'
      - name: Install uv
        if: needs.changes.outputs.backend == 'true'
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      # Pure logic (Pydantic schema validation) — no database, no Docker.
      - name: Pytest (unit)
        if: needs.changes.outputs.backend == 'true'
        working-directory: backend
        run: uv run --frozen --group dev pytest tests/unit -q

  integration:
    name: Integration tests
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - name: Skip (no backend changes)
        if: needs.changes.outputs.backend != 'true'
        run: echo "No backend changes — skipping integration tests."
      - uses: actions/checkout@v7
        if: needs.changes.outputs.backend == 'true'
      - name: Install uv
        if: needs.changes.outputs.backend == 'true'
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      # Uses testcontainers to spin up real Postgres 17; the ubuntu-latest
      # runner has a running Docker daemon available.
      - name: Pytest (integration)
        if: needs.changes.outputs.backend == 'true'
        working-directory: backend
        run: uv run --frozen --group dev pytest tests/integration -q

  client:
    name: Kanban client (lint + tests)
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - name: Skip (no kanban-client changes)
        if: needs.changes.outputs.client != 'true'
        run: echo "No kanban-client changes — skipping client lint + tests."
      - uses: actions/checkout@v7
        if: needs.changes.outputs.client == 'true'
      - name: Install uv
        if: needs.changes.outputs.client == 'true'
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      # Shared httpx wrapper (KAN-21) — every method is exercised against a
      # mocked httpx transport, so no backend or database is needed.
      - name: Ruff lint
        if: needs.changes.outputs.client == 'true'
        working-directory: kanban-client
        run: uv run --frozen --group dev ruff check .
      - name: Pytest
        if: needs.changes.outputs.client == 'true'
        working-directory: kanban-client
        run: uv run --frozen --group dev pytest -q

  mcp:
    name: MCP server (lint + tests)
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - name: Skip (no mcp changes)
        if: needs.changes.outputs.mcp != 'true'
        run: echo "No mcp changes — skipping MCP server lint + tests."
      - uses: actions/checkout@v7
        if: needs.changes.outputs.mcp == 'true'
      - name: Install uv
        if: needs.changes.outputs.mcp == 'true'
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      # Pure logic — the API client is exercised against a mocked httpx
      # transport, so no backend or database is needed.
      - name: Ruff lint
        if: needs.changes.outputs.mcp == 'true'
        working-directory: mcp
        run: uv run --frozen --group dev ruff check .
      - name: Pytest
        if: needs.changes.outputs.mcp == 'true'
        working-directory: mcp
        run: uv run --frozen --group dev pytest -q

  cli:
    name: CLI (lint + tests)
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - name: Skip (no kanban-cli changes)
        if: needs.changes.outputs.cli != 'true'
        run: echo "No kanban-cli changes — skipping CLI lint + tests."
      - uses: actions/checkout@v7
        if: needs.changes.outputs.cli == 'true'
      - name: Install uv
        if: needs.changes.outputs.cli == 'true'
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      # Pure logic — the shared client is exercised against a mocked httpx
      # transport, so no backend or database is needed.
      - name: Ruff lint
        if: needs.changes.outputs.cli == 'true'
        working-directory: kanban-cli
        run: uv run --frozen --group dev ruff check .
      - name: Pytest
        if: needs.changes.outputs.cli == 'true'
        working-directory: kanban-cli
        run: uv run --frozen --group dev pytest -q

  frontend:
    name: Frontend build & type-check
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - name: Skip (no frontend changes)
        if: needs.changes.outputs.frontend != 'true'
        run: echo "No frontend changes — skipping frontend build & type-check."
      - uses: actions/checkout@v7
        if: needs.changes.outputs.frontend == 'true'
      - uses: actions/setup-node@v4
        if: needs.changes.outputs.frontend == 'true'
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        if: needs.changes.outputs.frontend == 'true'
        working-directory: frontend
        run: npm ci
      - name: Type-check (svelte-check)
        if: needs.changes.outputs.frontend == 'true'
        working-directory: frontend
        run: npm run check
      - name: Build
        if: needs.changes.outputs.frontend == 'true'
        working-directory: frontend
        run: npm run build

  e2e:
    name: E2E (Playwright)
    needs: changes
    runs-on: ubuntu-latest
    # A long-running Postgres the backend connects to. Unlike the integration
    # job (testcontainers, in-process), the e2e backend is a separate uvicorn
    # process, so it needs a standalone DB — a service container fits.
    #
    # e2e exercises the full stack, so its heavy steps run when EITHER the
    # backend OR the frontend changed. Service containers are declared
    # statically and can't be gated on a step `if:`, but an idle Postgres
    # container on a docs-only run is cheap and the job still finishes fast.
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: kanban
          POSTGRES_PASSWORD: kanban
          POSTGRES_DB: kanban
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kanban -d kanban"
          --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      # The Playwright webServer boots `uv run uvicorn ...`, which inherits this.
      DATABASE_URL: postgresql+psycopg://kanban:kanban@localhost:5432/kanban
    steps:
      - name: Skip (no backend/frontend changes)
        if: needs.changes.outputs.backend != 'true' && needs.changes.outputs.frontend != 'true'
        run: echo "No backend or frontend changes — skipping e2e."

      - uses: actions/checkout@v7
        if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true'

      # Backend toolchain (Playwright's webServer runs migrations + uvicorn).
      - name: Install uv
        if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true'
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync backend deps
        if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true'
        working-directory: backend
        run: uv sync --frozen

      # Frontend toolchain (Vite dev server + Playwright).
      - uses: actions/setup-node@v4
        if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true'
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true'
        working-directory: frontend
        run: npm ci

      # Cache the downloaded browser (~120 MB) keyed on the Playwright version,
      # so it is only re-downloaded when @playwright/test is bumped.
      - name: Resolve Playwright version
        if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true'
        id: pw
        working-directory: frontend
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright browsers
        if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true'
        id: pw-cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.pw.outputs.version }}
      # On a cache miss install the browser + its OS libs; on a hit the browser
      # is restored, so only the (uncacheable, system-level) OS libs are needed.
      - name: Install Chromium + OS deps
        if: (needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true') && steps.pw-cache.outputs.cache-hit != 'true'
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Install Chromium OS deps only
        if: (needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true') && steps.pw-cache.outputs.cache-hit == 'true'
        working-directory: frontend
        run: npx playwright install-deps chromium

      # Playwright boots the backend (:8000) + Vite (:5173) itself and drives
      # Chromium against them. reuseExistingServer is false under CI.
      - name: Run e2e
        if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true'
        working-directory: frontend
        run: npm run e2e

      - name: Upload Playwright report
        if: ${{ failure() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  # Supply-chain hardening (dev-playbook principles 12 & 13): a secret scan over
  # the full git history plus a dependency vulnerability audit of every project.
  #
  # This job deliberately has NO `needs: changes` gate and NO job-level `if:` —
  # it ALWAYS runs and reports on every push/PR, because a leaked secret or a new
  # CVE can surface from a "docs-only" change (a pasted key in a Markdown file, an
  # advisory published against an already-locked dependency). It is fast enough
  # (secret scan ~1s over ~120 commits; audits hit only locked versions) to run
  # unconditionally.
  #
  # NOT a required status check. Branch protection lists the other jobs as
  # required; wiring `Security scan` in as a required check needs a maintainer
  # branch-protection settings change (same class of change as the aggressor
  # `CI Success` aggregator noted at the top of this file) and is left as a
  # documented follow-up. Until then this reports for visibility but does not
  # block merge — so a newly-published CVE surfaces without hard-stopping every
  # unrelated PR.
  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      # fetch-depth: 0 — gitleaks scans the whole history, not just the tip.
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # --- Secret scan (gitleaks) -------------------------------------------
      # Run the pinned official image directly rather than gitleaks/gitleaks-action
      # to sidestep its org-account license gate (GITLEAKS_LICENSE) and stay fully
      # deterministic. Exits non-zero if any secret is found in the working tree
      # or history. If this ever fails on a REAL secret, the fix is to ROTATE the
      # secret and rewrite history — never to add an allowlist to force CI green.
      - name: Secret scan (gitleaks)
        run: |
          docker run --rm -v "${{ github.workspace }}:/repo" \
            ghcr.io/gitleaks/gitleaks:v8.30.1 \
            detect --source /repo --no-banner --redact --verbose

      # --- Dependency toolchains --------------------------------------------
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # --- Python dependency audit (pip-audit) ------------------------------
      # Audit the locked deps of every uv project against the PyPI advisory DB.
      # `--no-emit-project` drops the project itself; `--no-emit-package
      # kanban-client` drops the local path dependency (an editable requirement
      # pip-audit can't resolve — kanban-client is audited as its own project);
      # `--no-hashes` because pip-audit only needs versions, not integrity hashes.
      # Threshold: pip-audit fails the step on ANY known vulnerability. That is
      # intentionally strict — the lockfiles are currently clean, and because this
      # job is non-required a finding surfaces loudly without blocking merge. If
      # it becomes noisy with unfixable/low-severity advisories, scope it (e.g.
      # `--vulnerability-service osv`, or gate on fixable/high) rather than muting.
      - name: Python dependency audit (pip-audit)
        run: |
          set -euo pipefail
          for d in backend mcp kanban-client kanban-cli; do
            echo "::group::pip-audit $d"
            ( cd "$d" && uv export --frozen --no-emit-project \
                --no-emit-package kanban-client --no-hashes \
                --format requirements-txt > /tmp/req.txt )
            uvx pip-audit -r /tmp/req.txt
            echo "::endgroup::"
          done

      # --- Frontend dependency audit (npm audit) ----------------------------
      # Reads package-lock.json directly (no `npm ci` needed). Threshold: fail
      # only on high/critical to avoid transitive-dev-dep noise blocking PRs.
      - name: Frontend dependency audit (npm audit)
        working-directory: frontend
        run: npm audit --audit-level=high
