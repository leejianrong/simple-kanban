name: CI

# Validate every PR and every push to main (ADR 0004). Four independent jobs:
# lint, fast unit tests (no Docker), integration tests (real Postgres via
# testcontainers), and the frontend build/type-check. The Deploy workflow only
# runs after this whole workflow succeeds on main.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Ruff lint
        working-directory: backend
        run: uv run --frozen --group dev ruff check .

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      # Pure logic (Pydantic schema validation) — no database, no Docker.
      - name: Pytest (unit)
        working-directory: backend
        run: uv run --frozen --group dev pytest tests/unit -q

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      # Uses testcontainers to spin up real Postgres 17; the ubuntu-latest
      # runner has a running Docker daemon available.
      - name: Pytest (integration)
        working-directory: backend
        run: uv run --frozen --group dev pytest tests/integration -q

  frontend:
    name: Frontend build & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        working-directory: frontend
        run: npm ci
      - name: Type-check (svelte-check)
        working-directory: frontend
        run: npm run check
      - name: Build
        working-directory: frontend
        run: npm run build
