name: CI

# Validate every PR and every push to main (ADR 0004). Five independent jobs:
# lint, fast unit tests (no Docker), integration tests (real Postgres via
# testcontainers), the frontend build/type-check, and Playwright e2e smoke tests
# (real Postgres via a service container). The Deploy workflow only runs after
# this whole workflow succeeds on main.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Ruff lint
        working-directory: backend
        run: uv run --frozen --group dev ruff check .

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      # Pure logic (Pydantic schema validation) — no database, no Docker.
      - name: Pytest (unit)
        working-directory: backend
        run: uv run --frozen --group dev pytest tests/unit -q

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      # Uses testcontainers to spin up real Postgres 17; the ubuntu-latest
      # runner has a running Docker daemon available.
      - name: Pytest (integration)
        working-directory: backend
        run: uv run --frozen --group dev pytest tests/integration -q

  frontend:
    name: Frontend build & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        working-directory: frontend
        run: npm ci
      - name: Type-check (svelte-check)
        working-directory: frontend
        run: npm run check
      - name: Build
        working-directory: frontend
        run: npm run build

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    # A long-running Postgres the backend connects to. Unlike the integration
    # job (testcontainers, in-process), the e2e backend is a separate uvicorn
    # process, so it needs a standalone DB — a service container fits.
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: kanban
          POSTGRES_PASSWORD: kanban
          POSTGRES_DB: kanban
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kanban -d kanban"
          --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      # The Playwright webServer boots `uv run uvicorn ...`, which inherits this.
      DATABASE_URL: postgresql+psycopg://kanban:kanban@localhost:5432/kanban
    steps:
      - uses: actions/checkout@v4

      # Backend toolchain (Playwright's webServer runs migrations + uvicorn).
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync backend deps
        working-directory: backend
        run: uv sync --frozen

      # Frontend toolchain (Vite dev server + Playwright).
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      # Cache the downloaded browser (~120 MB) keyed on the Playwright version,
      # so it is only re-downloaded when @playwright/test is bumped.
      - name: Resolve Playwright version
        id: pw
        working-directory: frontend
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.pw.outputs.version }}
      # On a cache miss install the browser + its OS libs; on a hit the browser
      # is restored, so only the (uncacheable, system-level) OS libs are needed.
      - name: Install Chromium + OS deps
        if: steps.pw-cache.outputs.cache-hit != 'true'
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Install Chromium OS deps only
        if: steps.pw-cache.outputs.cache-hit == 'true'
        working-directory: frontend
        run: npx playwright install-deps chromium

      # Playwright boots the backend (:8000) + Vite (:5173) itself and drives
      # Chromium against them. reuseExistingServer is false under CI.
      - name: Run e2e
        working-directory: frontend
        run: npm run e2e

      - name: Upload Playwright report
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
