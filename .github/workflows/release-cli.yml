name: Release CLI binary

# Build the `kan` CLI as a single self-contained executable (PyInstaller
# --onefile: freezes the interpreter + kanban_cli + the sibling kanban-client
# path dep + httpx into one file) so users can run it with no Python/uv
# installed (KAN-46). PyInstaller can't cross-compile, so we build natively on
# each target OS in a matrix and attach the results to the GitHub Release.
#
# SHIPPED LEGS: only `kan-linux-x86_64` (glibc-2.28 container build, below) and
# `kan-macos-arm64`. The Intel-mac (x86_64) leg was DROPPED (KAN-225):
# PyInstaller can't cross-compile so it must build on a native Intel runner, and
# GitHub's free Intel macOS runners are scarce/being retired, so that leg sat
# `queued` forever and the whole release run never reached a terminal state while
# the other assets attached fine. Intel-Mac users run the `kan-macos-arm64`
# binary under Rosetta 2, install from source via `uv`, or use the MCP container
# image.
#
# LINUX GLIBC FLOOR (KAN-81): the linux leg builds inside the
# `quay.io/pypa/manylinux_2_28_x86_64` container (AlmaLinux 8 = glibc 2.28) so
# the bundled libpython requires no symbol newer than GLIBC_2.28 and the binary
# runs on Ubuntu 20.04+, Debian 11+, RHEL 8+. Building on `ubuntu-latest`
# (Ubuntu 24.04 = glibc 2.39) previously baked in a GLIBC_2.38 requirement that
# broke every older-but-supported distro; the in-job smoke test missed it
# because it ran on the same fresh image it built on. The macOS leg is
# unaffected and builds on its native runner exactly as before.
#
# TRIGGER: version tags only (e.g. `git tag v0.2.0 && git push origin v0.2.0`).
# This never runs on a PR or a branch push — publishing is a deliberate,
# tag-gated ops action (mirrors the repo's tag convention; v0.1.0 already exists).
on:
  push:
    tags:
      - 'v*'

# Needed for softprops/action-gh-release to create/update the Release and
# upload assets with the built-in GITHUB_TOKEN.
permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    # Linux builds inside a glibc-2.28 container (KAN-81); the macOS leg sets an
    # empty string, which GitHub treats as "no container" (build on the host).
    container: ${{ matrix.container }}
    strategy:
      # One red target shouldn't cancel the others — collect what we can.
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest   # x86_64 Linux — built in a glibc-2.28 container
            container: quay.io/pypa/manylinux_2_28_x86_64
            asset: kan-linux-x86_64
          - os: macos-14        # Apple Silicon (arm64)
            container: ''
            asset: kan-macos-arm64
      # Windows is intentionally omitted for now — the .exe packaging + smoke
      # step differ enough to defer; add a `windows-latest` row (asset
      # `kan-windows-x86_64.exe`) when there's demand.
    defaults:
      run:
        working-directory: kanban-cli
    steps:
      - uses: actions/checkout@v7

      # macOS legs get Python from setup-python on the host.
      - name: Set up Python 3.12
        if: matrix.container == ''
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      # LINUX (KAN-81 follow-up): the manylinux-preinstalled CPython at
      # /opt/python/cp312-cp312 is built STATIC (no shared libpython), which
      # PyInstaller can't freeze ("Python was built without a shared library").
      # Install uv's managed standalone CPython instead — python-build-standalone
      # ships a *shared* libpython AND is built against old glibc (~2.17), so it
      # freezes cleanly and keeps the container's glibc-2.28 floor. Export
      # UV_PYTHON_PREFERENCE=only-managed for all *subsequent* steps (via
      # $GITHUB_ENV, linux-only) so uv picks this managed interpreter — never the
      # static system python — for both `uv sync` and `uv run pyinstaller`. Doing
      # it here (not job-level env) keeps the macOS legs completely untouched.
      - name: Install uv-managed CPython 3.12 (linux)
        if: matrix.container != ''
        run: |
          echo "UV_PYTHON_PREFERENCE=only-managed" >> "$GITHUB_ENV"
          uv python install 3.12

      # Installs the CLI, its runtime deps (httpx, the ../kanban-client path
      # dep, resolved at build time), and the `build` group (PyInstaller).
      # --python 3.12 pins the interpreter version; on linux UV_PYTHON_PREFERENCE
      # forces uv's managed (shared-libpython) build.
      - name: Install deps (incl. build group)
        run: uv sync --frozen --group build --python 3.12

      - name: Build --onefile binary
        run: >-
          uv run --frozen --group build pyinstaller --onefile
          --name "${{ matrix.asset }}"
          --collect-submodules kanban_cli
          --collect-submodules kanban_client
          packaging/pyinstaller_entry.py

      # Regression guard (KAN-81, linux only): assert the built onefile requires
      # no GLIBC symbol newer than 2.28. `strings` only sees the outer bootloader
      # (not the extracted libpython), so this is a cheap tripwire — the real
      # proof is the smoke-test step below, which actually RUNS the binary inside
      # this glibc-2.28 container. If someone reverts the linux leg to a newer
      # runner, the bootloader itself starts requiring a newer GLIBC and this
      # trips before we ever ship.
      - name: Guard — binary requires GLIBC <= 2.28
        if: matrix.container != ''
        run: |
          set -euo pipefail
          bin="dist/${{ matrix.asset }}"
          maxglibc=$(strings "$bin" | grep -oE 'GLIBC_2\.[0-9]+' | sort -V | tail -1)
          echo "Highest GLIBC symbol required by $bin bootloader: ${maxglibc:-none}"
          if [ -n "${maxglibc:-}" ]; then
            minor=${maxglibc#GLIBC_2.}
            if [ "$minor" -gt 28 ]; then
              echo "::error::$bin requires $maxglibc (> GLIBC_2.28) — it will not run on Ubuntu 20.04 / Debian 11 / RHEL 8."
              exit 1
            fi
          fi
          # Best-effort second signal: PyInstaller onefile extracts its bundle to
          # a temp dir at run time. Run the binary with $TMPDIR pinned and inspect
          # the extracted libpython with readelf. Never fail the job on extraction
          # trouble — the "runs under glibc 2.28" smoke test below is the
          # authoritative check; this is just extra evidence in the log.
          if command -v readelf >/dev/null 2>&1; then
            extract=$(mktemp -d)
            TMPDIR="$extract" ./"$bin" --help >/dev/null 2>&1 || true
            so=$(find "$extract" -name 'libpython3.12.so*' 2>/dev/null | head -1 || true)
            if [ -n "$so" ]; then
              echo "readelf GLIBC versions required by bundled $(basename "$so"):"
              readelf -V "$so" 2>/dev/null | grep -oE 'GLIBC_2\.[0-9]+' | sort -V | uniq || true
            else
              echo "note: could not capture extracted libpython for readelf (onefile cleans up its temp dir); relying on the run test."
            fi
            rm -rf "$extract"
          fi

      # Prove the frozen binary actually runs on the target OS before we ship it.
      # For linux this executes INSIDE the glibc-2.28 container, so a clean run
      # here is direct evidence the onefile (bootloader + extracted libpython)
      # loads under glibc 2.28 — the KAN-81 regression signal.
      - name: Smoke-test the binary
        run: |
          ./dist/${{ matrix.asset }} --help
          KANBAN_API_URL=https://simple-kanban-jian.fly.dev ./dist/${{ matrix.asset }} warmup

      - name: Attach binary to the Release
        uses: softprops/action-gh-release@v3
        with:
          files: kanban-cli/dist/${{ matrix.asset }}
          fail_on_unmatched_files: true
