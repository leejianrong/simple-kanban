name: Deploy

# Auto-deploy to Fly.io on merge to main (ADR 0004). Triggered only after the CI
# workflow completes, and only proceeds if CI succeeded on the main branch — so a
# red build never ships. Auth via the FLY_API_TOKEN repo secret.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]

jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    # Gate: CI passed AND it was the main branch that ran.
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    concurrency:
      group: deploy-production
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
        with:
          # Deploy exactly the commit CI validated, not whatever is latest.
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
