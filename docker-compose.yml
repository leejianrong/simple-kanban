# Local Postgres for dev/CI parity (SHAPING §Packaging). The app reads DATABASE_URL
# pointing at this instance. Prod uses Neon; nothing here ships to prod.
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: kanban
      POSTGRES_PASSWORD: kanban
      POSTGRES_DB: kanban
    ports:
      - "5432:5432"
    volumes:
      - kanban_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kanban -d kanban"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  kanban_pgdata:
