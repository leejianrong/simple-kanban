# Local full-stack: Postgres + the combined app image (built SPA served by FastAPI).
# Mirrors the single production artifact (ADR 0003). Prod uses Neon; nothing here ships.
services:
  app:
    build: .
    environment:
      # Points at the db service on the compose network.
      DATABASE_URL: postgresql+psycopg://kanban:kanban@db:5432/kanban
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: kanban
      POSTGRES_PASSWORD: kanban
      POSTGRES_DB: kanban
    ports:
      - "5432:5432"
    volumes:
      - kanban_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kanban -d kanban"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  kanban_pgdata:
